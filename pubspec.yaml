
name: quicktype_dart
description: A build_runner plugin to generate cross-platform models using quicktype
version: 0.0.1
homepage: www.simplezen.io
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.6.2

dependencies:
  build: ^2.3.1
  json_serializable: ^6.9.4

dev_dependencies:
  build_test: ^2.1.6
  test: ^1.22.0
  build_config: ^1.1.1
  glob: ^2.1.1
  path: ^1.8.3
  yaml: ^3.1.1
  process_run: ^0.12.5
  json_schema: ^5.2.1
  logging: ^1.3.0
  crypto: ^3.0.6
  plugin_platform_interface: ^2.1.8
  path_provider: ^2.1.5
  ffigen: ^17.0.0
  build_runner: ^2.4.15
  args: ^2.6.0

dart:
  plugin:
    platforms:
      android:
        package: com.simplezen.quicktype_dart
        pluginClass: QuicktypeBuilderPlugin
        ffiPlugin: true
      ios:
        pluginClass: QuicktypeBuilderPlugin
        ffiPlugin: true
      macos:
        pluginClass: QuicktypeBuilderPlugin
        ffiPlugin: true
      web:
        pluginClass: QuicktypeBuilderPlugin
        fileName: quicktype_dart.dart
        ffiPlugin: true
      windows:
        pluginClass: QuicktypeBuilderPlugin
        ffiPlugin: true
      linux:
        pluginClass: QuicktypeBuilderPlugin
        ffiPlugin: true