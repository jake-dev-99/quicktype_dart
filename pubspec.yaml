name: quicktype_dart
description: >-
  Cross-platform type generation from JSON, JSON Schema, GraphQL, or TypeScript.
  Produces Dart, Kotlin, Swift, TypeScript, and 18 other languages — at build
  time via build_runner, or at runtime from in-memory data. A pigeon-analogue
  for arbitrarily-nested typed data.
version: 0.2.0-dev.6
homepage: https://www.simplezen.io
repository: https://github.com/jake-dev-99/quicktype_dart
issue_tracker: https://github.com/jake-dev-99/quicktype_dart/issues

topics:
  - codegen
  - build-runner
  - quicktype
  - json
  - cross-platform

environment:
  sdk: ^3.6.2

dependencies:
  args: ^2.6.0
  build: ^4.0.0
  ffi: ^2.1.3
  glob: ^2.1.1
  json_schema: ^5.2.1
  logging: ^1.3.0
  path: ^1.8.3

dev_dependencies:
  build_runner: ^2.4.15
  test: ^1.25.0

# Flutter FFI plugin configuration. Only macOS is wired up in v0.2.0-dev.2;
# Linux/Windows/Android/iOS land in subsequent dev.N releases.
flutter:
  plugin:
    platforms:
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
