# build.yaml — registers per-target quicktype_dart builders.
#
# Consumers opt in by adding to their own build.yaml:
#
#   targets:
#     $default:
#       builders:
#         quicktype_dart:dart:
#           enabled: true
#           options:
#             args:
#               use-freezed: true
#               null-safety: true
#
# Input convention: files named `*.qt.json` are processed. Output is written
# next to the source with the language's primary extension — e.g.
# `lib/models/user.qt.json` → `lib/models/user.dart`.

builders:
  dart:
    import: "package:quicktype_dart/entrypoint_runner.dart"
    builder_factories: ["quicktypeBuilder"]
    build_extensions: {".qt.json": [".dart"]}
    auto_apply: none
    build_to: source
    defaults:
      options:
        target: dart

  kotlin:
    import: "package:quicktype_dart/entrypoint_runner.dart"
    builder_factories: ["quicktypeBuilder"]
    build_extensions: {".qt.json": [".kt"]}
    auto_apply: none
    build_to: source
    defaults:
      options:
        target: kotlin

  swift:
    import: "package:quicktype_dart/entrypoint_runner.dart"
    builder_factories: ["quicktypeBuilder"]
    build_extensions: {".qt.json": [".swift"]}
    auto_apply: none
    build_to: source
    defaults:
      options:
        target: swift

  typescript:
    import: "package:quicktype_dart/entrypoint_runner.dart"
    builder_factories: ["quicktypeBuilder"]
    build_extensions: {".qt.json": [".ts"]}
    auto_apply: none
    build_to: source
    defaults:
      options:
        target: typescript
