# Base lint set: the "recommended" rules from package:lints, which are
# the same rules pub.dev scores on. Hardened with strict language modes
# so casts, raw types, and inferred dynamics can't sneak back in.
#
# See https://dart.dev/lints and https://dart.dev/tools/analysis.
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Keep TODOs visible without failing CI — the plan tracks our
    # actual outstanding work, not scattered `// TODO` notes.
    todo: ignore

linter:
  rules:
    # Enabled on top of lints/recommended.yaml. These catch concrete bugs
    # and hygiene issues that the recommended set leaves optional.
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_empty_else
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - join_return_with_assignment
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - prefer_const_declarations
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_single_quotes
    - public_member_api_docs
    - throw_in_finally
    - unawaited_futures
    - unnecessary_lambdas
    - unnecessary_statements
